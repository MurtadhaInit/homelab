---
- name: Prepare Proxmox nodes for remote management
  hosts: proxmox-hosts
  remote_user: root
  vars:
    automation_user: "ansible"
    automation_user_pub_key: "~/.ssh/keys/proxmox-hosts-automation.pub"
    regular_user: "murtadha"
    regular_user_pub_key: "~/.ssh/keys/proxmox-hosts.pub"
  vars_files:
    - ../vars/secrets.yaml

  tasks:
    - name: Install the sudo package
      ansible.builtin.package:
        name: sudo
        state: present

    - name: Create a specific automation user for performing future Ansible tasks
      block:
        - name: Create the automation user
          ansible.builtin.user:
            name: "{{ automation_user }}"
            state: present
            groups:
              - sudo
            shell: /bin/bash
            comment: Automation User
            password: '!'

        - name: Supply the public SSH key generated for the new user
          ansible.posix.authorized_key:
            key: "{{ lookup('file', automation_user_pub_key) }}"
            user: "{{ automation_user }}"
            exclusive: true
            state: present

        - name: Allow sudo without password for the user
          ansible.builtin.lineinfile:
            path: "/etc/sudoers"
            search_string: "{{ automation_user }}"
            line: "{{ automation_user }} ALL=(ALL) NOPASSWD: ALL"
            state: present
            validate: "/usr/sbin/visudo -cf %s"

    - name: Create a regular user for other manual management tasks
      block:
        - name: Create the other user
          ansible.builtin.user:
            name: "{{ regular_user }}"
            state: present
            groups:
              - sudo
            shell: /bin/bash
            password: "{{ regular_user_pass | password_hash('sha512', salt, rounds=657235) }}"

        - name: Supply the public SSH key generated for the new user
          ansible.posix.authorized_key:
            key: "{{ lookup('file', regular_user_pub_key) }}"
            user: "{{ regular_user }}"
            exclusive: true
            state: present

    - name: Disable SSH password authentication on the server
      ansible.builtin.lineinfile:
        path: "/etc/ssh/sshd_config"
        search_string: "PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
