---
- name: Configure an Ubuntu cloud image VM with Docker
  hosts: ubuntu-docker-vm
  remote_user: automator

  tasks:
    - name: Add Docker GPG apt Key
      become: true
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "a+r"

    - name: Get architecture
      changed_when: false
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: arch

    - name: Add Docker Repository
      become: true
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker packages
      become: true
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    # - name: Install Docker Module for Python
    #   ansible.builtin.pip:
    #     name: docker

    - name: Create a docker group
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add the user to the docker group (and no one else)
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups:
          - docker

    - name: Change the ownership and permissions of .docker directory
      ansible.builtin.file:
        mode: 'g+rwx'
        owner: "{{ ansible_user_id }}"
        path: "/home/{{ ansible_user_id }}/.docker"
        recurse: true
        state: directory

    - name: Set logging limits to avoid exhausting disk space
      become: true
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: '644'
        content: '
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m",
              "max-file": "5"
            }
          }'
      notify: Restart Docker

  handlers:
    - name: Restart Docker
      become: true
      loop:
        - docker.service
        - containerd.service
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
