---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/kubernetes-sigs/gateway-api/crd-install
  ref:
    tag: v1.5.1
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: OCIRepository
    name: gateway-api
  prune: false
  wait: true
