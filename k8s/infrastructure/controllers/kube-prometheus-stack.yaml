---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: prometheus-operator-crds
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.1.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    # CRDs are managed by the separate prometheus-operator-crds release
    crds:
      enabled: false

    defaultRules:
      create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        retention: 120h
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 1Gi

    grafana:
      enabled: true
      defaultDashboardsEnabled: true
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # Requests put the pod in Burstable QoS so it isn't first in line for
      # eviction under node memory pressure. The limit is a circuit breaker
      # for runaway memory (e.g. plugin or render leak), not a steady-state cap.
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 768Mi
      persistence:
        enabled: true
        type: sts
        storageClassName: longhorn
        accessModes: [ReadWriteOnce]
        size: 2Gi
      sidecar:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
      # Disable the chart's networking.k8s.io Ingress; we expose Grafana
      # via the Gateway API HTTPRoute defined below.
      ingress:
        enabled: false

    # Talos: Cilium replaces kube-proxy
    kubeProxy:
      enabled: false

    # Talos: etcd metrics require client certs mounted into Prometheus.
    # Revisit once we want control-plane etcd dashboards.
    kubeEtcd:
      enabled: false

    # Talos labels its control-plane static pods with k8s-app=<component>,
    # not the upstream `component=` convention the chart assumes.
    kubeControllerManager:
      service:
        selector:
          k8s-app: kube-controller-manager
    kubeScheduler:
      service:
        selector:
          k8s-app: kube-scheduler

    prometheus:
      prometheusSpec:
        # Discover *Monitor / Probe / Rule / ScrapeConfig CRs across all
        # namespaces without requiring chart-specific labels. Any chart
        # that ships a ServiceMonitor (cert-manager, longhorn, cilium, ...)
        # will be picked up automatically.
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false

        retention: 7d
        retentionSize: 6GiB

        # Requests put Prometheus in Burstable QoS (lower OOM eviction priority
        # than BestEffort) and bound Go's automemlimit to the cgroup limit
        # rather than 90% of node memory. The limit is a circuit breaker for
        # cardinality blow-ups, not a steady-state cap — Prometheus typically
        # sits well below this for a small homelab scrape volume.
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1500Mi

        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 8Gi
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab
      namespace: gateway-system
      sectionName: https
  hostnames:
    - grafana.k8s.murtadha.dev
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
