---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  # node-exporter (DaemonSet) needs hostNetwork/hostPID/hostPath which the
  # cluster default `baseline` PSA policy forbids. Same pattern as longhorn-system.
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 12h
  type: oci
  url: oci://ghcr.io/prometheus-community/charts
---
# CRDs for the Prometheus Operator are installed via this dedicated chart so
# that CRD upgrades go through Helm's normal upgrade path. The bundled CRDs
# in kube-prometheus-stack live under the chart's `crds/` directory and are
# only installed once on first install — never updated on chart upgrade.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-operator-crds
      version: 28.0.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
