apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  path: ./k8s/apps/observability/uptime-kuma/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
