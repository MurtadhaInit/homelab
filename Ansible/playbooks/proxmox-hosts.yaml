---
# NOTE: the root password is required one time only with --ask-pass to set up SSH keys for root
- name: Prepare Proxmox nodes for remote management
  hosts: proxmox_hosts
  remote_user: root
  vars:
    regular_user: "{{ ssh_users[0]['user_name'] }}"
    regular_user_pub_key: "{{ ssh_users[0]['pub_key'] }}"
  vars_files:
    - ../vars/secrets.yaml
    - ../vars/ssh_users.yaml

  tasks:
    - name: Supply the generated public SSH key to the root user first
      ansible.posix.authorized_key:
        key: "{{ lookup('file', regular_user_pub_key) }}"
        user: root
        exclusive: true
        state: present

    - name: Install the sudo package
      ansible.builtin.package:
        name: sudo
        state: present

    - name: Create a regular user for manual management and automation tasks
      block:
        - name: Create the regular user
          ansible.builtin.user:
            name: "{{ regular_user }}"
            state: present
            groups:
              - sudo
            shell: /bin/bash
            password: "{{ regular_user_pass | password_hash('sha512', salt, rounds=657235) }}"

        - name: Supply the generated public SSH key to the regular user (same one for root)
          ansible.posix.authorized_key:
            key: "{{ lookup('file', regular_user_pub_key) }}"
            user: "{{ regular_user }}"
            exclusive: true
            state: present

        - name: Allow sudo without password for the regular user (primarily for automation)
          ansible.builtin.copy:
            dest: "/etc/sudoers.d/{{ regular_user }}"
            content: "{{ regular_user }} ALL=(ALL) NOPASSWD: ALL\n"
            mode: "0440"
            owner: root
            group: root
            validate: "/usr/sbin/visudo -cf %s"

    - name: Disable SSH password authentication on the server
      ansible.builtin.lineinfile:
        path: "/etc/ssh/sshd_config"
        search_string: "PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Restart SSH

    - name: Make the required (equivalent) changes on the PVE Web Gui side
      block:
        - name: List available groups
          changed_when: false
          ansible.builtin.command:
            cmd: pveum group list
          register: pve_groups

        - name: Create the admins group if it doesn't exist
          when: not pve_groups.stdout is search('admins')
          changed_when: not pve_groups.stdout is search('admins')
          ansible.builtin.command:
            cmd: 'pveum group add admins --comment "Admins Group"'

        - name: List assigned roles
          changed_when: false
          ansible.builtin.command:
            cmd: pveum acl list
          register: pve_perms

        - name: Assign the 'Administrator' role (i.e. permissions) to the 'admins' group if it doesn't have it
          when: not pve_perms.stdout is search('admins')
          changed_when: not pve_perms.stdout is search('admins')
          ansible.builtin.command:
            cmd: 'pveum acl modify / --roles Administrator --groups admins'

        - name: List existent Web GUI users
          changed_when: false
          ansible.builtin.command:
            cmd: pveum user list
          register: pve_web_users

          # NOTE: the password used for Web GUI is going to be the same one set for the underlying PAM user
          # NOTE: 2FA needs to be enabled manually from the web GUI (for both this and the root user)
        - name: Mirror (i.e. create) the regular user if not present
          when: not pve_web_users.stdout is search(regular_user + '@pam')
          changed_when: not pve_web_users.stdout is search(regular_user + '@pam')
          ansible.builtin.command:
            cmd: "pveum user add {{ regular_user }}@pam --email {{ email }} --firstname '{{ regular_user | capitalize }}' --groups admins"

    - name: Enable the snippets content type for local storage
      changed_when: true
      ansible.builtin.command:
        cmd: 'pvesm set local --content vztmpl,backup,iso,snippets'

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
