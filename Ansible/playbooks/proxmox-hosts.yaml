---
# NOTE: the root password is required one time only with --ask-pass to set up SSH keys for root
- name: Prepare Proxmox nodes for remote management
  hosts: proxmox_hosts
  remote_user: root
  vars:
    regular_user: murtadha
    public_ssh_key: "~/.ssh/keys/proxmox-hosts.pub"
    proxmox_api:
      host: "{{ ansible_host }}"
      port: 8006
      user: "root@pam"
      token_id: automation
      # Generate a token on the GUI console with: pveum user token add root@pam automation --privsep 0
      token_secret: "{{ root_user_api_token_secret }}" # Or generate new token and pass this var value at runtime
      validate_certs: false
  vars_files:
    # for regular_user_pass, salt, email, and root_user_api_token_secret
    - ../vars/secrets.yaml

  tasks:
    - name: Supply the generated public SSH key to the root user first
      ansible.posix.authorized_key:
        key: "{{ lookup('file', public_ssh_key) }}"
        user: root
        exclusive: true
        state: present

    - name: Install the sudo package
      ansible.builtin.package:
        name: sudo
        state: present

    - name: Create a regular user for manual management and automation tasks
      ansible.builtin.user:
        name: "{{ regular_user }}"
        state: present
        groups:
          - sudo
        shell: /bin/bash
        password: "{{ regular_user_pass | password_hash('sha512', salt, rounds=657235) }}"

    - name: Supply the generated public SSH key to the regular user (same one for root)
      ansible.posix.authorized_key:
        key: "{{ lookup('file', public_ssh_key) }}"
        user: "{{ regular_user }}"
        exclusive: true
        state: present

    - name: Allow sudo without password for the regular user (primarily for automation)
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ regular_user }}"
        content: "{{ regular_user }} ALL=(ALL) NOPASSWD: ALL\n"
        mode: "0440"
        owner: root
        group: root
        validate: "/usr/sbin/visudo -cf %s"

    - name: Disable SSH password authentication on the server
      ansible.builtin.lineinfile:
        path: "/etc/ssh/sshd_config"
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Restart SSH

    - name: Make the required (equivalent) changes on the PVE Web Gui side
      delegate_to: localhost # these modules make API calls to the Proxmox API *from* the controller
      module_defaults:
        group/community.proxmox.proxmox:
          api_host: "{{ proxmox_api.host }}"
          api_port: "{{ proxmox_api.port }}"
          api_user: "{{ proxmox_api.user }}"
          api_token_id: "{{ proxmox_api.token_id }}"
          api_token_secret: "{{ proxmox_api.token_secret }}"
          validate_certs: "{{ proxmox_api.validate_certs }}"
      block:
        - name: Create the admins group
          community.proxmox.proxmox_group:
            groupid: admins
            comment: "Admins Group"
            state: present
        - name: Assign the 'Administrator' role (i.e. permissions) to the 'admins' group
          community.proxmox.proxmox_access_acl:
            path: /
            roleid: Administrator
            type: group
            ugid: admins
            state: present
        - name: Create the regular user, mirroring the underlying PAM user created earlier
          community.proxmox.proxmox_user:
            # NOTE: the password used for Web GUI is going to be the same one set for the underlying PAM user
            userid: "{{ regular_user }}@pam"
            firstname: "{{ regular_user | capitalize }}"
            email: "{{ email }}"
            groups:
              - admins
            # keys: # TODO: for 2FA (Yubico)
            # NOTE: 2FA needs to be enabled manually from the web GUI (for both this and the root user)
            enable: true
            state: present

    - name: Check the content types for current 'local' storage
      ansible.builtin.command:
        cmd: pvesh get /storage/local --output-format json
      changed_when: false
      register: local_storage_config
    - name: Enable all content types for 'local' storage (including 'snippets')
      changed_when: true
      vars:
        desired_content_types:
          - vztmpl
          - backup
          - iso
          - snippets
          - import
          - images
          - rootdir
      when: desired_content_types | difference((local_storage_config.stdout | from_json).content.split(',')) | length > 0
      ansible.builtin.command:
        cmd: "pvesm set local --content {{ desired_content_types | join(',') }}"

    # - name: Install 'amd64-microcode' after enabling the 'non-free-firmware' Debian repositories
    #   block:
    #     - name: Enable the non-free-firmware component in Proxmox sources
    #       ansible.builtin.apt_repository:
    #         repo: "deb http://deb.debian.org/debian {{ ansible_distribution_release }} main contrib non-free-firmware"
    #         filename: debian-non-free-firmware
    #         state: present
    #     - name: Install amd64-microcode
    #       ansible.builtin.apt:
    #         name: amd64-microcode
    #         state: present
    #         update_cache: true

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
