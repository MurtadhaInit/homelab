[env]
_.python.venv = ".venv"
_.file = ".env"
TALOSCONFIG = "{{ config_root }}/k8s/talosconfig"
KUBECONFIG = "{{ config_root }}/k8s/kubeconfig"

[tools]
uv = "latest"
opentofu = "latest"
helm = "latest"
flux2 = "latest"
kubectl = "1.35" # should match the version of Kubernetes deployed
talosctl = "1.12" # should match the version of Talos Linux deployed
